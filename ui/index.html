<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DEHB ve disleksi için okunabilir metin demo arayüzü" />
  <title>Nexus AI | Okunabilir Metin Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="reader-stage" aria-label="Erişilebilir okuma sahnesi">
      <div class="reader-stage-frame">
        <div class="meta-row">
          <span class="meta-pill" id="readTime">Okuma süresi hesaplanıyor</span>
          <span class="meta-pill meta-pill-soft">Odak modu destekli</span>
          <span class="meta-pill meta-pill-soft">Tam ekran akış</span>
        </div>
        <section class="summary-card" aria-label="Özet">
          <h3>TL;DR</h3>
          <ul id="tldrList"></ul>
        </section>
        <div class="reader" id="reader" aria-live="polite"></div>
      </div>
    </section>

    <aside class="control-dock" aria-label="Metin kontrol paneli">
      <div class="panel-header">
        <span class="dot"></span>
        <span>Nexus AI · Ayarlar</span>
      </div>

      <label class="field">
        <span>Gelme hızı</span>
        <input id="speed" type="range" min="1" max="12" value="1" />
        <small><span id="speedLabel">Çok sakin</span> hızda akıyor.</small>
      </label>

      <label class="field">
        <span>Yazı boyutu</span>
        <input id="fontSize" type="range" min="22" max="42" value="32" />
        <small>Satırları daha rahat takip etmek için.</small>
      </label>

      <label class="toggle">
        <input id="focusMode" type="checkbox" checked />
        <span>Odak modu açık</span>
      </label>

      <div class="card-head dock-head">
        <h2>Kaynak metin</h2>
        <p>Şimdilik test verisi: lorem 100</p>
      </div>

      <textarea id="sourceText" spellcheck="false">Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum. Integer posuere erat a ante venenatis dapibus posuere velit aliquet. Sed posuere consectetur est at lobortis. Aenean eu leo quam. Pellentesque ornare sem lacinia quam venenatis vestibulum. Donec sed odio dui. Cras mattis consectetur purus sit amet fermentum.</textarea>

      <div class="actions">
        <button id="restart" type="button">Akışı yeniden başlat</button>
        <button id="instant" type="button" class="ghost">Tam metni göster</button>
      </div>
    </aside>
  </main>

  <script src="/ui/app.js"></script>
</body>
</html>
